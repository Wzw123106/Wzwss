# Netlify：https://docs.netlify.com/configure-builds/file-based-configuration/
#
# 线上环境与本地 dev 不同：浏览器不能直接请求东方财富域名（CORS）。
# 前端默认走同源的 /__em-* 前缀，这里改用 Netlify Functions 转发（比 Edge 超时更宽松）。

[build]
  command = "yarn build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/__em-push2/*"
  to = "/.netlify/functions/eastmoney-proxy/push2/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__em-push2his/*"
  to = "/.netlify/functions/eastmoney-proxy/push2his/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__em-fundgz/*"
  to = "/.netlify/functions/eastmoney-proxy/fundgz/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__em-fund/*"
  to = "/.netlify/functions/eastmoney-proxy/fund/:splat"
  status = 200
  force = true

# 单页应用兜底（放在最后）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
